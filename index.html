<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Anchor Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #1a1a2e;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        canvas { display: block; }
        #info {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            pointer-events: none;
            letter-spacing: 0.5px;
        }
        .settings-wrap {
            position: fixed;
            top: 12px;
            right: 16px;
            z-index: 10;
            user-select: none;
        }
        .settings-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.75);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            margin-left: auto;
        }
        .settings-btn:hover { background: rgba(255,255,255,0.22); }
        .speed-menu {
            display: none;
            margin-top: 6px;
            background: rgba(20,20,40,0.92);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 6px 0;
            min-width: 160px;
            backdrop-filter: blur(8px);
        }
        .speed-menu.open { display: block; }
        .speed-item {
            display: block;
            width: 100%;
            padding: 7px 18px;
            border: none;
            background: transparent;
            color: rgba(255,255,255,0.65);
            font-size: 13px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: background 0.15s, color 0.15s;
        }
        .speed-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
        .speed-item.active { color: #f0a500; font-weight: 600; }
        .scale-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px 6px;
            border-top: 1px solid rgba(255,255,255,0.08);
            margin-top: 2px;
        }
        .scale-label {
            color: rgba(255,255,255,0.45);
            font-size: 12px;
            white-space: nowrap;
        }
        .scale-slider {
            flex: 1;
            -webkit-appearance: none;
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.15);
            outline: none;
        }
        .scale-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #f0a500;
            cursor: pointer;
        }
        .scale-val {
            color: rgba(255,255,255,0.65);
            font-size: 12px;
            min-width: 32px;
            text-align: right;
        }
        .title-overlay {
            display: flex;
            position: fixed;
            inset: 0;
            z-index: 30;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 24px;
            background: #1a1a2e;
            cursor: pointer;
        }
        .title-overlay.hidden { display: none; }
        .title-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .title-icon {
            width: 128px;
            height: 128px;
            object-fit: contain;
        }
        .title-text {
            font-size: 64px;
            font-weight: 700;
            color: rgba(255,255,255,0.85);
            letter-spacing: 4px;
        }
        .title-sub {
            font-size: 16px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 2px;
        }
        .menu-overlay {
            display: flex;
            position: fixed;
            inset: 0;
            z-index: 20;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            flex-direction: column;
            gap: 32px;
        }
        .menu-overlay.hidden { display: none; }
        .menu-title {
            font-size: 36px;
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            letter-spacing: 2px;
        }
        .menu-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-width: 780px;
        }
        .menu-btn {
            padding: 14px 48px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            color: rgba(255,255,255,0.85);
            font-size: 17px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s, border-color 0.2s, transform 0.1s;
            text-align: center;
        }
        .menu-btn:hover {
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,255,0.4);
            transform: scale(1.03);
        }
        .menu-btn .sub {
            display: block;
            font-size: 12px;
            color: rgba(255,255,255,0.45);
            margin-top: 4px;
            font-weight: 400;
        }
        .back-btn {
            position: fixed;
            top: 12px;
            left: 16px;
            z-index: 10;
            padding: 6px 14px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.55);
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s, color 0.2s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
        .back-btn.hidden { display: none; }
        .result-overlay {
            display: flex;
            position: fixed;
            inset: 0;
            z-index: 30;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.6);
        }
        .result-overlay.hidden { display: none; }
        .result-card {
            background: rgba(20,20,50,0.95);
            border: 2px solid rgba(240,165,0,0.4);
            border-radius: 16px;
            padding: 32px 48px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 12px;
            backdrop-filter: blur(8px);
            min-width: 240px;
        }
        .result-title {
            font-size: 28px;
            font-weight: 700;
            color: #f0a500;
        }
        .result-text {
            font-size: 28px;
            font-weight: 700;
            color: #f0a500;
        }
        .result-btn {
            padding: 12px 32px;
            border: 2px solid #f0a500;
            border-radius: 10px;
            background: rgba(240,165,0,0.15);
            color: #f0a500;
            font-size: 16px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s, transform 0.1s;
        }
        .result-btn:hover { background: rgba(240,165,0,0.3); transform: scale(1.04); }
        .debug-panel {
            position: fixed;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 25;
            display: flex;
            gap: 6px;
        }
        .debug-col {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .debug-btn {
            padding: 4px 10px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            background: rgba(0,0,0,0.5);
            color: rgba(255,255,255,0.5);
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, color 0.15s;
        }
        .debug-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

        .landscape-hint {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            color: #fff;
            font-size: 20px;
            text-align: center;
        }
        .landscape-hint.show { display: flex; }
        .landscape-icon {
            width: 80px;
            height: 60px;
            border: 3px solid #fff;
            border-radius: 8px;
            animation: rotate-hint 2s ease-in-out infinite;
        }
        @keyframes rotate-hint {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
        }

        @media (max-width: 768px) {
            .debug-panel { display: none; }
            .title-text { font-size: 40px; }
            .title-icon { width: 80px; height: 80px; }
        }
        @media (max-width: 480px) {
            .title-text { font-size: 28px; }
            .title-icon { width: 56px; height: 56px; }
            .title-sub { font-size: 14px; }
            .settings-btn { width: 30px; height: 30px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="title-overlay" id="titleOverlay">
        <div class="title-row">
            <img class="title-icon" id="titleImg1" src="anchor.webp">
            <span class="title-text">的大</span>
            <img class="title-icon" id="titleImg2" src="fake_anchor.webp">
            <span class="title-text">险</span>
        </div>
        <div class="title-sub">点击任意位置开始</div>
    </div>
    <div class="menu-overlay hidden" id="menuOverlay"></div>
    <div class="result-overlay hidden" id="resultOverlay">
        <div class="result-card">
            <div class="result-text" id="resultText"></div>
            <button class="result-btn" id="resultBtn">下一关</button>
        </div>
    </div>
    <button class="back-btn hidden" id="backBtn">← 返回选关</button>
    <div class="debug-panel" id="debugPanel">
        <div class="debug-col">
            <button class="debug-btn" data-ch="0">1-1</button>
            <button class="debug-btn" data-ch="1">1-2</button>
            <button class="debug-btn" data-ch="2">1-3</button>
            <button class="debug-btn" data-ch="3">2-1</button>
            <button class="debug-btn" data-ch="4">2-2</button>
            <button class="debug-btn" data-ch="5">2-3</button>
            <button class="debug-btn" data-ch="6">3-1</button>
            <button class="debug-btn" data-ch="7">3-2</button>
            <button class="debug-btn" data-ch="8">3-3</button>
            <button class="debug-btn" data-ch="9">4-1</button>
        </div>
        <div class="debug-col">
            <button class="debug-btn enter-btn" data-lvl="3">L1-1</button>
            <button class="debug-btn enter-btn" data-lvl="4">L1-2</button>
            <button class="debug-btn enter-btn" data-lvl="10">L1-3</button>
            <button class="debug-btn enter-btn" data-lvl="6">L2-1</button>
            <button class="debug-btn enter-btn" data-lvl="7">L2-2</button>
            <button class="debug-btn enter-btn" data-lvl="11">L2-3</button>
            <button class="debug-btn enter-btn" data-lvl="12">L3-1</button>
            <button class="debug-btn enter-btn" data-lvl="8">L3-2</button>
            <button class="debug-btn enter-btn" data-lvl="13">L3-3</button>
            <button class="debug-btn enter-btn" data-lvl="9">L4-1</button>
        </div>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="settings-wrap">
        <button class="settings-btn" id="settingsBtn" title="设置">⚙</button>
        <div class="speed-menu" id="speedMenu">
            <button class="speed-item" data-speed="0.5">0.5x</button>
            <button class="speed-item" data-speed="0.75">0.75x</button>
            <button class="speed-item active" data-speed="1">1x</button>
            <button class="speed-item" data-speed="1.5">1.5x</button>
            <button class="speed-item" data-speed="2">2x</button>
            <div class="scale-row">
                <span class="scale-label">缩放</span>
                <input type="range" class="scale-slider" id="scaleSlider" min="25" max="100" value="50" step="1">
                <span class="scale-val" id="scaleVal">50%</span>
            </div>
        </div>
    </div>
    <div id="info">点击矩形暂停 · 拖动到顶点切换锚点</div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let canvasW, canvasH;

        function resize() {
            canvasW = canvas.width = window.innerWidth;
            canvasH = canvas.height = window.innerHeight;
            if (gameState === 'MAP') { initMap(); return; }
            if (gameState !== 'PLAYING') return;
            if (currentLevel === 3) { resetLevel3(); return; }
            if (currentLevel === 4) { resetLevel4(); return; }
            if (currentLevel === 10) { resetLevel10(); return; }
            if (currentLevel === 11) { resetLevel11(); return; }
            if (currentLevel === 12) { resetLevel12(); return; }
            if (currentLevel === 13) { resetLevel13(); return; }
            if (currentLevel === 6) { resetLevel6(); return; }
            if (currentLevel === 7) { resetLevel7(); return; }
            if (currentLevel === 8) { resetLevel8(); return; }
            if (currentLevel === 9) { resetLevel9(); return; }
            initCorners();
            if (currentLevel === 1) generateTarget();
            else generateLevel2Targets();
        }

        const BASE_W = 256;
        const BASE_H = 256;
        const ROTATION_SPEED = 0.012;
        const BASE_VERTEX_RADIUS = 14;
        const TARGET_SCALE = 2;
        const COOLDOWN_FRAMES = 60;
        const BASE_L2_TW = 180, BASE_L2_TH = 180, L2_COUNT = 3;

        let W = BASE_W;
        let H = BASE_H;
        let VERTEX_HIT_RADIUS = BASE_VERTEX_RADIUS;
        let L2_TW = BASE_L2_TW;
        let L2_TH = BASE_L2_TH;
        let OVERLAP_THRESHOLD = Math.min(L2_TW, L2_TH) * 0.18;
        let scaleFactor = 1;

        function applyScale(factor) {
            scaleFactor = factor;
            W = Math.round(BASE_W * factor);
            H = Math.round(BASE_H * factor);
            L2_TW = Math.round(BASE_L2_TW * factor);
            L2_TH = Math.round(BASE_L2_TH * factor);
            VERTEX_HIT_RADIUS = Math.round(BASE_VERTEX_RADIUS * factor);
            OVERLAP_THRESHOLD = Math.max(5, Math.round(Math.min(L2_TW, L2_TH) * 0.18));
            target.w = W * TARGET_SCALE;
            target.h = H * TARGET_SCALE;
            if (gameState === 'PLAYING') {
                if (currentLevel === 3) {
                    resetLevel3();
                } else if (currentLevel === 4) {
                    resetLevel4();
                } else if (currentLevel === 10) {
                    resetLevel10();
                } else if (currentLevel === 11) {
                    resetLevel11();
                } else if (currentLevel === 12) {
                    resetLevel12();
                } else if (currentLevel === 13) {
                    resetLevel13();
                } else if (currentLevel === 6) {
                    resetLevel6();
                } else if (currentLevel === 7) {
                    resetLevel7();
                } else if (currentLevel === 8) {
                    resetLevel8();
                } else if (currentLevel === 9) {
                    resetLevel9();
                }
            }
        }

        let state = 'ROTATING';
        let angle = 0;
        let anchorIdx = 0;
        let heroMotion = 'rotate';
        let score = 0;
        let speedMultiplier = 1;
        let gameState = 'TITLE';
        let currentLevel = 3;
        let chapterIdx = 0;

        const CHAPTERS = [
            { id: '1-1', level: 3 },
            { id: '1-2', level: 4 },
            { id: '1-3', level: 10 },
            { id: '2-1', level: 6 },
            { id: '2-2', level: 7 },
            { id: '2-3', level: 11 },
            { id: '3-1', level: 12 },
            { id: '3-2', level: 8 },
            { id: '3-3', level: 13 },
            { id: '4-1', level: 9 },
        ];
        let completedChapters = {};
        let mapTargets = [];
        let mapPhase = 0;
        let tutPhase = 0;
        let target = { x: 0, y: 0, w: W * TARGET_SCALE, h: H * TARGET_SCALE };
        let targets = [];
        let traps = [];
        let floatingTexts = [];
        let cooldownTimer = 0;

        let scaleValue = 0.5, scalePhase = 0, scaleAnchorIdx = 2, scaleDir = 1;
        let scaleBaseOffsets = [];
        let targetPaused = false;
        const SCALE_SPEED = 0.02;
        const TOTAL_LEVELS = 9;

        let corners2 = [], baseOffsets2 = [], anchorPos2 = {};
        let anchorIdx2 = 0, angle2 = 0, state2 = 'ROTATING';
        let hero2Motion = 'scale';
        let scaleValue2 = 0.5, scalePhase2 = 0, scaleAnchorIdx2 = 2, scaleDir2 = 1;
        let scaleBaseOffsets2 = [];

        applyScale(0.5);

        const anchorImg = new Image();
        anchorImg.src = 'anchor.webp';
        let imgLoaded = false;
        let innerRect = null;
        anchorImg.onload = () => {
            imgLoaded = true;
            analyzeTransparency();
        };

        function analyzeTransparency() {
            const w = anchorImg.width;
            const h = anchorImg.height;
            const tc = document.createElement('canvas');
            tc.width = w; tc.height = h;
            const tctx = tc.getContext('2d');
            tctx.drawImage(anchorImg, 0, 0);
            const d = tctx.getImageData(0, 0, w, h).data;
            let minX = w, minY = h, maxX = 0, maxY = 0;
            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    if (d[(y * w + x) * 4 + 3] > 10) {
                        if (x < minX) minX = x;
                        if (x > maxX) maxX = x;
                        if (y < minY) minY = y;
                        if (y > maxY) maxY = y;
                    }
                }
            }
            if (maxX > minX && maxY > minY) {
                innerRect = {
                    left: minX / w,
                    right: maxX / w,
                    top: minY / h,
                    bottom: maxY / h,
                };
            }
        }

        const trapImg = new Image();
        trapImg.src = 'shuriken.webp';
        let trapImgLoaded = false;
        trapImg.onload = () => { trapImgLoaded = true; };

        const fakeAnchorImg = new Image();
        fakeAnchorImg.src = 'fake_anchor.webp';
        let fakeAnchorLoaded = false;
        fakeAnchorImg.onload = () => { fakeAnchorLoaded = true; };

        const infusedCoreImg = new Image();
        infusedCoreImg.src = 'infused_core.webp';
        let infusedCoreLoaded = false;
        infusedCoreImg.onload = () => { infusedCoreLoaded = true; };

        const stoneCrackerImg = new Image();
        stoneCrackerImg.src = 'stone_cracker.webp';
        let stoneCrackerLoaded = false;
        stoneCrackerImg.onload = () => { stoneCrackerLoaded = true; };

        let corners = [];
        let baseOffsets = [];
        let anchorPos = { x: 0, y: 0 };

        function initCorners() {
            heroMotion = 'rotate';
            const cx = canvasW / 2;
            const cy = canvasH / 2;
            corners = [
                { x: cx - W / 2, y: cy - H / 2 },
                { x: cx + W / 2, y: cy - H / 2 },
                { x: cx + W / 2, y: cy + H / 2 },
                { x: cx - W / 2, y: cy + H / 2 },
            ];
            anchorIdx = 0;
            angle = 0;
            anchorPos = { ...corners[anchorIdx] };
            recomputeBaseOffsets();
        }

        function recomputeBaseOffsets() {
            baseOffsets = corners.map(c => ({
                x: c.x - anchorPos.x,
                y: c.y - anchorPos.y,
            }));
        }

        function rotatePoint(p, a) {
            const cos = Math.cos(a), sin = Math.sin(a);
            return {
                x: p.x * cos - p.y * sin,
                y: p.x * sin + p.y * cos,
            };
        }

        function updateCorners() {
            for (let i = 0; i < 4; i++) {
                const r = rotatePoint(baseOffsets[i], angle);
                corners[i] = { x: anchorPos.x + r.x, y: anchorPos.y + r.y };
            }
        }

        function setNewAnchor(idx) {
            anchorIdx = idx;
            anchorPos = { ...corners[idx] };
            angle = 0;
            recomputeBaseOffsets();
        }

        function rectAABB() {
            return {
                minX: Math.min(...corners.map(c => c.x)),
                minY: Math.min(...corners.map(c => c.y)),
                maxX: Math.max(...corners.map(c => c.x)),
                maxY: Math.max(...corners.map(c => c.y)),
            };
        }

        function generateTarget() {
            const tw = target.w, th = target.h;
            for (let i = 0; i < 200; i++) {
                const tx = 10 + Math.random() * (canvasW - tw - 20);
                const ty = 40 + Math.random() * (canvasH - th - 50);
                const aabb = rectAABB();
                if (aabb.maxX < tx || aabb.minX > tx + tw || aabb.maxY < ty || aabb.minY > ty + th) {
                    target.x = tx;
                    target.y = ty;
                    return;
                }
            }
            target.x = 10;
            target.y = 50;
        }

        function checkSuccess() {
            const { x, y, w, h } = target;
            for (const c of corners) {
                if (c.x < x || c.x > x + w || c.y < y || c.y > y + h) return false;
            }
            return true;
        }

        function satCollision(rotated, aabb) {
            return satOverlap(rotated, aabb) > 0;
        }

        function satOverlap(rotated, aabb) {
            const axes = [
                { x: rotated[1].x - rotated[0].x, y: rotated[1].y - rotated[0].y },
                { x: rotated[3].x - rotated[0].x, y: rotated[3].y - rotated[0].y },
                { x: 1, y: 0 },
                { x: 0, y: 1 },
            ].map(a => {
                const len = Math.sqrt(a.x * a.x + a.y * a.y);
                return { x: a.x / len, y: a.y / len };
            });

            const aabbCorners = [
                { x: aabb.x, y: aabb.y },
                { x: aabb.x + aabb.w, y: aabb.y },
                { x: aabb.x + aabb.w, y: aabb.y + aabb.h },
                { x: aabb.x, y: aabb.y + aabb.h },
            ];

            let minOverlap = Infinity;
            for (const axis of axes) {
                let minR = Infinity, maxR = -Infinity;
                for (const c of rotated) {
                    const p = c.x * axis.x + c.y * axis.y;
                    if (p < minR) minR = p;
                    if (p > maxR) maxR = p;
                }
                let minA = Infinity, maxA = -Infinity;
                for (const c of aabbCorners) {
                    const p = c.x * axis.x + c.y * axis.y;
                    if (p < minA) minA = p;
                    if (p > maxA) maxA = p;
                }
                if (maxR < minA || maxA < minR) return 0;
                const overlap = Math.min(maxR, maxA) - Math.max(minR, minA);
                if (overlap < minOverlap) minOverlap = overlap;
            }
            return minOverlap;
        }

        function generateLevel2Targets() {
            targets = [];
            for (let j = 0; j < L2_COUNT; j++) {

        function satOverlapPoly(polyA, polyB) {
            const axes = [];
            for (const poly of [polyA, polyB]) {
                for (let i = 0; i < poly.length; i++) {
                    const j = (i + 1) % poly.length;
                    const dx = poly[j].x - poly[i].x;
                    const dy = poly[j].y - poly[i].y;
                    const len = Math.sqrt(dx * dx + dy * dy);
                    axes.push({ x: dx / len, y: dy / len });
                }
            }
            let minOverlap = Infinity;
            for (const axis of axes) {
                let minA = Infinity, maxA = -Infinity;
                for (const c of polyA) {
                    const p = c.x * axis.x + c.y * axis.y;
                    if (p < minA) minA = p; if (p > maxA) maxA = p;
                }
                let minB = Infinity, maxB = -Infinity;
                for (const c of polyB) {
                    const p = c.x * axis.x + c.y * axis.y;
                    if (p < minB) minB = p; if (p > maxB) maxB = p;
                }
                if (maxA < minB || maxB < minA) return 0;
                const overlap = Math.min(maxA, maxB) - Math.max(minA, minB);
                if (overlap < minOverlap) minOverlap = overlap;
            }
            return minOverlap;
        }

            anchorPos = { ...corners[anchorIdx] };
            recomputeBaseOffsets();

            corners2 = [
                { x: cx2 - W / 2, y: cy - H / 2 },
                { x: cx2 + W / 2, y: cy - H / 2 },
                { x: cx2 + W / 2, y: cy + H / 2 },
                { x: cx2 - W / 2, y: cy + H / 2 },
            ];
            scaleAnchorIdx2 = 2;
            scaleValue2 = 0.5; scalePhase2 = 0; scaleDir2 = 1;
            recomputeScaleOffsets2();

            target.x = canvasW / 2 - (W * TARGET_SCALE) / 2;
            target.y = cy - (H * TARGET_SCALE) / 2;
            target.w = W * TARGET_SCALE;
            target.h = H * TARGET_SCALE;

            generateLevel8Traps();
            state = 'ROTATING'; state2 = 'ROTATING';
        }

        function generateLevel8Traps() {
            traps = [];
            const hw = L2_TW / 2, hh = L2_TH / 2;
            const cy = canvasH / 2;
            const mid = canvasW / 2;

            const scalePositions = [
                { x: canvasW * 0.35, y: cy - canvasH * 0.12 },
                { x: canvasW * 0.35, y: cy + canvasH * 0.12 },
            ];
            for (const p of scalePositions) {
                const crn = [
                    { x: p.x - hw, y: p.y - hh }, { x: p.x + hw, y: p.y - hh },
                    { x: p.x + hw, y: p.y + hh }, { x: p.x - hw, y: p.y + hh },
                ];
                traps.push({
                    w: L2_TW, h: L2_TH, motion: 'scale', corners: crn,
                    scaleAnchorIdx: 4,
                    state: 'ROTATING',
                    baseAnchor: { x: p.x, y: p.y },
                    scaleValue: 0.75, scalePhase: Math.random() * Math.PI,
                    scaleDir: (Math.random() > 0.5 ? 1 : -1),
                    scaleBaseOffsets: crn.map(c => ({ x: (c.x - p.x) / 0.75, y: (c.y - p.y) / 0.75 })),
                });
            }

            const rotPositions = [
                { x: canvasW * 0.65, y: cy - canvasH * 0.12 },
                { x: canvasW * 0.65, y: cy + canvasH * 0.12 },
            ];
            for (const p of rotPositions) {
                const crn = [
                    { x: p.x - hw, y: p.y - hh }, { x: p.x + hw, y: p.y - hh },
                    { x: p.x + hw, y: p.y + hh }, { x: p.x - hw, y: p.y + hh },
                ];
                traps.push({
                    w: L2_TW, h: L2_TH, motion: 'rotate', corners: crn,
                    anchorIdx: 4,
                    angle: Math.random() * Math.PI * 2, speed: 3 * ROTATION_SPEED,
                    state: 'ROTATING',
                    anchorPos: { x: p.x, y: p.y },
                    baseOffsets: crn.map(c => ({ x: c.x - p.x, y: c.y - p.y })),
                });
            }
        }

        function updateLevel8Traps() {
            for (const t of traps) {
                if (t.state !== 'ROTATING') continue;
                if (t.motion === 'scale') {
                    t.scalePhase += t.scaleDir * SCALE_SPEED * speedMultiplier;
                    t.scaleValue = 0.75 + 0.25 * Math.sin(t.scalePhase);
                    for (let i = 0; i < 4; i++) {
                        t.corners[i] = { x: t.baseAnchor.x + t.scaleBaseOffsets[i].x * t.scaleValue, y: t.baseAnchor.y + t.scaleBaseOffsets[i].y * t.scaleValue };
                    }
                } else {
                    t.angle += t.speed * speedMultiplier;
                    updateTrapCorners(t);
                }
            }
        }

        function checkLevel8Failure() {
            for (const t of traps) {
                if (satOverlapPoly(corners, t.corners) >= OVERLAP_THRESHOLD) return true;
                if (satOverlapPoly(corners2, t.corners) >= OVERLAP_THRESHOLD) return true;
            }
            return false;
        }

        function recomputeScaleOffsets2() {
            const anchor = corners2[scaleAnchorIdx2];
            scaleBaseOffsets2 = corners2.map(c => ({
                x: (c.x - anchor.x) / Math.max(scaleValue2, 0.01),
                y: (c.y - anchor.y) / Math.max(scaleValue2, 0.01),
            }));
        }

        function updateLevel8Hero2() {
            if (state2 === 'ROTATING') {
                scalePhase2 += scaleDir2 * SCALE_SPEED * speedMultiplier;
                scaleValue2 = 0.5 + 0.25 * Math.sin(scalePhase2);
            }
            const anchor = corners2[scaleAnchorIdx2];
            for (let i = 0; i < 4; i++) {
                corners2[i] = {
                    x: anchor.x + scaleBaseOffsets2[i].x * scaleValue2,
                    y: anchor.y + scaleBaseOffsets2[i].y * scaleValue2,
                };
            }
        }

        function setScaleAnchor2(idx) {
            scaleAnchorIdx2 = idx;
            scaleDir2 *= -1;
            recomputeScaleOffsets2();
        }

        function checkLevel8Success() {
            const { x, y, w, h } = target;
            for (const c of corners) {
                if (c.x < x || c.x > x + w || c.y < y || c.y > y + h) return false;
            }
            for (const c of corners2) {
                if (c.x < x || c.x > x + w || c.y < y || c.y > y + h) return false;
            }
            return true;
        }

        function resetLevel8() {
            initLevel8();
            cooldownTimer = 0;
        }

        let targetVX = 0, targetVY = 1;

        function initLevel12() {
            heroMotion = 'rotate';
            hero2Motion = 'scale';
            const cx1 = canvasW * 0.2;
            const cx2 = canvasW * 0.8;
            const cy = canvasH / 2;
            corners = [
                { x: cx1 - W / 2, y: cy - H / 2 },
                { x: cx1 + W / 2, y: cy - H / 2 },
                { x: cx1 + W / 2, y: cy + H / 2 },
                { x: cx1 - W / 2, y: cy + H / 2 },
            ];
            anchorIdx = 0; angle = 0;
            anchorPos = { ...corners[anchorIdx] };
            recomputeBaseOffsets();

            corners2 = [
                { x: cx2 - W / 2, y: cy - H / 2 },
                { x: cx2 + W / 2, y: cy - H / 2 },
                { x: cx2 + W / 2, y: cy + H / 2 },
                { x: cx2 - W / 2, y: cy + H / 2 },
            ];
            scaleAnchorIdx2 = 2;
            scaleValue2 = 0.5; scalePhase2 = 0; scaleDir2 = 1;
            recomputeScaleOffsets2();

            target.x = canvasW / 2 - (W * TARGET_SCALE) / 2;
            target.y = cy - (H * TARGET_SCALE) / 2;
            target.w = W * TARGET_SCALE;
            target.h = H * TARGET_SCALE;
            targetVX = 0; targetVY = 1;
            targetPaused = false;
            state = 'ROTATING'; state2 = 'ROTATING';
        }

        function updateLevel12Target() {
            if (targetPaused) return;
            const speed = 1.2;
            target.x += targetVX * speed;
            target.y += targetVY * speed;
            if (target.x < 0 || target.x + target.w > canvasW) targetVX *= -1;
            if (target.y < 0 || target.y + target.h > canvasH) targetVY *= -1;
        }

        function checkLevel12Success() {
            const { x, y, w, h } = target;
            for (const c of corners) if (c.x < x || c.x > x + w || c.y < y || c.y > y + h) return false;
            for (const c of corners2) if (c.x < x || c.x > x + w || c.y < y || c.y > y + h) return false;
            return true;
        }

        function resetLevel12() {
            initLevel12();
            cooldownTimer = 0;
        }

        function initLevel13() {
            heroMotion = 'rotate';
            hero2Motion = 'scale';
            const cx1 = canvasW * 0.12;
            const cx2 = canvasW * 0.25;
            const cy = canvasH / 2;
            corners = [
                { x: cx1 - W / 2, y: cy - H / 2 },
                { x: cx1 + W / 2, y: cy - H / 2 },
                { x: cx1 + W / 2, y: cy + H / 2 },
                { x: cx1 - W / 2, y: cy + H / 2 },
            ];
            anchorIdx = 0; angle = 0;
            anchorPos = { ...corners[anchorIdx] };
            recomputeBaseOffsets();

            corners2 = [
                { x: cx2 - W / 2, y: cy - H / 2 },
                { x: cx2 + W / 2, y: cy - H / 2 },
                { x: cx2 + W / 2, y: cy + H / 2 },
                { x: cx2 - W / 2, y: cy + H / 2 },
            ];
            scaleAnchorIdx2 = 2;
            scaleValue2 = 0.5; scalePhase2 = 0; scaleDir2 = 1;
            recomputeScaleOffsets2();

            target.x = canvasW * 0.75 - (W * TARGET_SCALE) / 2;
            target.y = cy - (H * TARGET_SCALE) / 2;
            target.w = W * TARGET_SCALE;
            target.h = H * TARGET_SCALE;
            targetVX = 0; targetVY = 1;
            targetPaused = false;

            generateLevel13Traps();
            state = 'ROTATING'; state2 = 'ROTATING';
        }

        function generateLevel13Traps() {
            traps = [];
            const hw = L2_TW / 2, hh = L2_TH / 2;
            const colX1 = canvasW * 0.44;
            const colX2 = canvasW * 0.52;
            const rows = 6;
            const stepY = canvasH / (rows + 1);

            const cos90 = 0, sin90 = 1;
            for (let r = 0; r < rows; r++) {
                const cy = stepY * (r + 1);
                const crn1 = [
                    { x: colX1 - hw, y: cy - hh },
                    { x: colX1 + hw, y: cy - hh },
                    { x: colX1 + hw, y: cy + hh },
                    { x: colX1 - hw, y: cy + hh },
                ];
                const rc1 = crn1.map(c => ({
                    x: colX1 + (c.x - colX1) * cos90 - (c.y - cy) * sin90,
                    y: cy + (c.x - colX1) * sin90 + (c.y - cy) * cos90,
                }));
                traps.push({ w: L2_TW, h: L2_TH, motion: 'static', corners: rc1 });
            }
            for (let r = 0; r < rows; r++) {
                const cy = stepY * (r + 1);
                const crn2 = [
                    { x: colX2 - hw, y: cy - hh },
                    { x: colX2 + hw, y: cy - hh },
                    { x: colX2 + hw, y: cy + hh },
                    { x: colX2 - hw, y: cy + hh },
                ];
                const rc2 = crn2.map(c => ({
                    x: colX2 + (c.x - colX2) * cos90 - (c.y - cy) * (-sin90),
                    y: cy + (c.x - colX2) * (-sin90) + (c.y - cy) * cos90,
                }));
                traps.push({ w: L2_TW, h: L2_TH, motion: 'static', corners: rc2 });
            }
        }

        function checkLevel13Failure() {
            for (const t of traps) {
                if (satOverlapPoly(corners, t.corners) >= OVERLAP_THRESHOLD) return true;
                if (satOverlapPoly(corners2, t.corners) >= OVERLAP_THRESHOLD) return true;
            }
            return false;
        }

        function checkLevel13Success() {
            const { x, y, w, h } = target;
            for (const c of corners) if (c.x < x || c.x > x + w || c.y < y || c.y > y + h) return false;
            for (const c of corners2) if (c.x < x || c.x > x + w || c.y < y || c.y > y + h) return false;
            return true;
        }

        function resetLevel13() {
            initLevel13();
            cooldownTimer = 0;
        }

        let alignAnchors = [];
        let hAlign = 'left', vAlign = 'top';
        let heroGX = 0, heroGY = 0;

        function initLevel9() {
            heroMotion = 'align';
            const heroSize = W;
            const pad = heroSize * 0.3;
            const boxW = heroSize * 3 + pad * 2;
            const boxH = heroSize * 3 + pad * 2;
            const bx = (canvasW - boxW) / 2;
            const by = (canvasH - boxH) / 2;

            corners = [
                { x: bx, y: by },
                { x: bx + boxW, y: by },
                { x: bx + boxW, y: by + boxH },
                { x: bx, y: by + boxH },
            ];

            const tw = W * 1.4, th = H * 1.4;
            target.w = tw; target.h = th;
            target.x = bx + boxW - pad - tw;
            target.y = by + boxH - pad - th;

            alignAnchors = [
                { x: bx + boxW / 2, y: by + pad / 2, dir: 'top' },
                { x: bx + boxW / 2, y: by + boxH - pad / 2, dir: 'bottom' },
                { x: bx + pad / 2, y: by + boxH / 2, dir: 'left' },
                { x: bx + boxW - pad / 2, y: by + boxH / 2, dir: 'right' },
            ];

            hAlign = 'left'; vAlign = 'top';
            setHeroTarget();
            heroGX = alignTargetX; heroGY = alignTargetY;
            updateHeroPos();
            state = 'ROTATING';
        }

        let alignTargetX = 0, alignTargetY = 0;

        function setHeroTarget() {
            const pad = W * 0.3;
            const bx = corners[0].x, by = corners[0].y;
            const boxW = corners[1].x - bx, boxH = corners[3].y - by;
            alignTargetX = hAlign === 'left' ? bx + pad + W / 2 : bx + boxW - pad - W / 2;
            alignTargetY = vAlign === 'top' ? by + pad + H / 2 : by + boxH - pad - H / 2;
        }

        function updateHeroPos() {
            const gx = heroGX, gy = heroGY;
            corners2 = [
                { x: gx - W / 2, y: gy - H / 2 },
                { x: gx + W / 2, y: gy - H / 2 },
                { x: gx + W / 2, y: gy + H / 2 },
                { x: gx - W / 2, y: gy + H / 2 },
            ];
        }

        function updateLevel9Motion() {
            const lerp = 0.12;
            heroGX += (alignTargetX - heroGX) * lerp;
            heroGY += (alignTargetY - heroGY) * lerp;
            updateHeroPos();
        }

        function checkLevel9Success() {
            const { x, y, w, h } = target;
            for (const c of corners2) {
                if (c.x < x || c.x > x + w || c.y < y || c.y > y + h) return false;
            }
            return true;
        }

        function resetLevel9() {
            initLevel9();
            cooldownTimer = 0;
        }

        let mousePos = { x: -100, y: -100 };
        let mouseDown = false;

        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            const pos = { x: e.clientX - rect.left, y: e.clientY - rect.top };
            mousePos = pos;

            if ((currentLevel >= 3 && currentLevel <= 7 || currentLevel >= 10 && currentLevel <= 11 || currentLevel === 8) && pausedTrap < 0 && state === 'ROTATING') {
                for (let i = 0; i < traps.length; i++) {
                    if (traps[i].state === 'ROTATING' && pointInPolygon(pos, traps[i].corners)) {
                        mouseDown = true;
                        traps[i].state = 'PAUSED';
                        pausedTrap = i;
                        return;
                    }
                }
            }

            if (corners2.length > 0 && pointInPolygon(pos, corners2)) {
                mouseDown = true;
                state2 = 'PAUSED';
                state = 'ROTATING';
                return;
            }

            if (pointInPolygon(pos, corners)) {
                mouseDown = true;
                state = 'PAUSED';
                if (corners2.length > 0) state2 = 'ROTATING';
            }

            if (gameState === 'MYSTERY') {
                mysteryAnchor = !mysteryAnchor;
                return;
            }

            if ((currentLevel === 12 || currentLevel === 13) && pos.x >= target.x && pos.x <= target.x + target.w && pos.y >= target.y && pos.y <= target.y + target.h) {
                mouseDown = true;
                targetPaused = true;
                state = 'ROTATING';
                if (corners2.length > 0) state2 = 'ROTATING';
                return;
            }

            if (currentLevel === 9 && pointInPolygon(pos, corners)) {
                mouseDown = true;
                state = 'PAUSED';
                return;
            }

            if (pointInPolygon(pos, corners)) {
                mouseDown = true;
                state = 'PAUSED';
                if (pausedTrap >= 0) {
                    traps[pausedTrap].state = 'ROTATING';
                    pausedTrap = -1;
                }
            }
        });

        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mousePos = { x: e.clientX - rect.left, y: e.clientY - rect.top };

            if (currentLevel === 9 && state === 'PAUSED') {
                let near = false;
                for (const a of alignAnchors) {
                    const dx = mousePos.x - a.x, dy = mousePos.y - a.y;
                    if (dx * dx + dy * dy < VERTEX_HIT_RADIUS * VERTEX_HIT_RADIUS) { near = true; break; }
                }
                canvas.style.cursor = near ? 'pointer' : 'default';
            } else if (state === 'PAUSED') {
                const near = findNearVertex(mousePos);
                canvas.style.cursor = near !== -1 ? 'pointer' : 'default';
            } else if (state2 === 'PAUSED') {
                const near = findNearVertex2(mousePos);
                canvas.style.cursor = near !== -1 ? 'pointer' : 'default';
            } else if (pausedTrap >= 0) {
                const near = findNearTrapVertex(mousePos, traps[pausedTrap]);
                canvas.style.cursor = near !== -1 ? 'pointer' : 'default';
            } else if (currentLevel >= 3 && currentLevel <= 8 || currentLevel >= 10 && currentLevel <= 11) {
                let over = pointInPolygon(mousePos, corners);
                if (!over) {
                    for (const t of traps) {
                        if (t.state === 'ROTATING' && pointInPolygon(mousePos, t.corners)) { over = true; break; }
                    }
                }
                canvas.style.cursor = over ? 'pointer' : 'default';
            } else if (currentLevel === 8 || currentLevel === 12) {
                canvas.style.cursor = (pointInPolygon(mousePos, corners) || pointInPolygon(mousePos, corners2) || ((currentLevel === 12 || currentLevel === 13) && mousePos.x >= target.x && mousePos.x <= target.x + target.w && mousePos.y >= target.y && mousePos.y <= target.y + target.h)) ? 'pointer' : 'default';
            } else if (currentLevel === 9) {
                canvas.style.cursor = pointInPolygon(mousePos, corners) ? 'pointer' : 'default';
            } else {
                canvas.style.cursor = pointInPolygon(mousePos, corners) ? 'pointer' : 'default';
            }
        });

        canvas.addEventListener('mouseup', e => {
            if (!mouseDown) return;
            mouseDown = false;

            const rect = canvas.getBoundingClientRect();
            const pos = { x: e.clientX - rect.left, y: e.clientY - rect.top };

            if (pausedTrap >= 0) {
                const near = findNearTrapVertex(pos, traps[pausedTrap]);
                if (near !== -1) {
                    if (traps[pausedTrap].motion === 'scale') setTrapScaleAnchor(traps[pausedTrap], near);
                    else if (traps[pausedTrap].scaleAnchorIdx !== undefined) setTrapScaleAnchor(traps[pausedTrap], near);
                    else setTrapAnchor(traps[pausedTrap], near);
                }
                traps[pausedTrap].state = 'ROTATING';
                pausedTrap = -1;
            } else if (state2 === 'PAUSED') {
                const near = findNearVertex2(pos);
                if (near !== -1) setScaleAnchor2(near);
                state2 = 'ROTATING';
            } else if (currentLevel === 9 && state === 'PAUSED') {
                for (const a of alignAnchors) {
                    const dx = pos.x - a.x, dy = pos.y - a.y;
                    if (dx * dx + dy * dy < VERTEX_HIT_RADIUS * VERTEX_HIT_RADIUS) {
                        if (a.dir === 'left' || a.dir === 'right') hAlign = a.dir;
                        else vAlign = a.dir;
                        setHeroTarget();
                        break;
                    }
                }
                state = 'ROTATING';
            } else if ((currentLevel === 12 || currentLevel === 13) && targetPaused) {
                const tcx = target.x + target.w / 2, tcy = target.y + target.h / 2;
                const dx = pos.x - tcx, dy = pos.y - tcy;
                if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
                    if (Math.abs(dx) > Math.abs(dy)) { targetVX = dx > 0 ? 1 : -1; targetVY = 0; }
                    else { targetVY = dy > 0 ? 1 : -1; targetVX = 0; }
                }
                targetPaused = false;
            } else if (gameState === 'MYSTERY' && mysteryAnchor) {
                const tcx = canvasW / 2, tcy = canvasH / 2;
                const dx = pos.x - tcx, dy = pos.y - tcy;
                if (Math.abs(dx) > 20 || Math.abs(dy) > 20) {
                    const step = W * 1.5;
                    if (Math.abs(dx) > Math.abs(dy)) shiftX += dx > 0 ? step : -step;
                    else shiftY += dy > 0 ? step : -step;
                }
                mysteryAnchor = false;
            } else {
                const near = findNearVertex(pos);
                if (near !== -1) {
                    if (heroMotion === 'scale') setScaleAnchor(near);
                    else setNewAnchor(near);
                }
                state = 'ROTATING';
            }
            canvas.style.cursor = 'default';
        });

        function pointInPolygon(p, poly) {
            let inside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                const xi = poly[i].x, yi = poly[i].y;
                const xj = poly[j].x, yj = poly[j].y;
                if ((yi > p.y) !== (yj > p.y) && p.x < ((xj - xi) * (p.y - yi)) / (yj - yi) + xi) {
                    inside = !inside;
                }
            }
            return inside;
        }

        function findNearVertex(pos) {
            for (let i = 0; i < 4; i++) {
                const dx = pos.x - corners[i].x;
                const dy = pos.y - corners[i].y;
                if (dx * dx + dy * dy < VERTEX_HIT_RADIUS * VERTEX_HIT_RADIUS) return i;
            }
            
            return -1;
        }

        function findNearVertex2(pos) {
            for (let i = 0; i < 4; i++) {
                const dx = pos.x - corners2[i].x;
                const dy = pos.y - corners2[i].y;
                if (dx * dx + dy * dy < VERTEX_HIT_RADIUS * VERTEX_HIT_RADIUS) return i;
            }
            
            return -1;
        }

        function findNearTrapVertex(pos, trap) {
            for (let i = 0; i < 4; i++) {
                const dx = pos.x - trap.corners[i].x;
                const dy = pos.y - trap.corners[i].y;
                if (dx * dx + dy * dy < VERTEX_HIT_RADIUS * VERTEX_HIT_RADIUS) return i;
            }
            const cx = (trap.corners[0].x + trap.corners[2].x) / 2;
            const cy = (trap.corners[0].y + trap.corners[2].y) / 2;
            const dx = pos.x - cx, dy = pos.y - cy;
            if (dx * dx + dy * dy < VERTEX_HIT_RADIUS * VERTEX_HIT_RADIUS) return 4;
            return -1;
        }

        /* ── Drawing ── */

        function draw() {
            ctx.clearRect(0, 0, canvasW, canvasH);

            if (gameState === 'MAP') {
                drawMapTargets();
                drawRect();
                if (corners2.length > 0) drawHero2();
                drawFloatingTexts();
                if (state === 'PAUSED') drawVertices();
                else if (state2 === 'PAUSED') drawVertices2();
                return;
            }
            if (gameState === 'MYSTERY') {
                drawMystery();
                drawFloatingTexts();
                return;
            }
            if (currentLevel === 9) drawLevel9();
            else if (currentLevel === 3 || currentLevel === 6 || currentLevel === 10) { drawTarget(); drawLevel3Traps(); }
            else if (currentLevel === 4) { drawTarget(); drawLevel4Traps(); }
            else if (currentLevel === 7 || currentLevel === 11) { drawTarget(); drawLevel4Traps(); }
            else if (currentLevel === 8) { drawTarget(); drawLevel8Traps(); }
            else if (currentLevel === 13) { drawTarget(); drawStoneTraps(); }
            else drawTarget();
            if (currentLevel !== 9) drawRect();
            if (corners2.length > 0) drawHero2();
            if ((currentLevel === 12 || currentLevel === 13) && targetPaused) drawTargetDirAnchors();
            drawFloatingTexts();
            if (state === 'PAUSED' && currentLevel !== 9) drawVertices();
            else if (state2 === 'PAUSED') drawVertices2();
            else if (pausedTrap >= 0) drawTrapVertices(traps[pausedTrap]);
        }

        function drawRect() {
            const p = corners;
            const useScale = heroMotion === 'scale';
            const img = useScale ? fakeAnchorImg : anchorImg;
            const loaded = useScale ? fakeAnchorLoaded : imgLoaded;

                ctx.moveTo(p[0].x, p[0].y);
                for (let i = 1; i < 4; i++) ctx.lineTo(p[i].x, p[i].y);

        function drawRotationArrow(cx, cy, r, alpha) {
            const start = -Math.PI * 0.6;
            const end = Math.PI * 0.6;
            ctx.beginPath();
            ctx.arc(cx, cy, r, start, end);
            ctx.strokeStyle = `rgba(255,255,255,${0.55 * alpha})`;
            ctx.lineWidth = 3;
            ctx.stroke();

            const tipX = cx + r * Math.cos(end);
            const tipY = cy + r * Math.sin(end);
            const ah = 10;
            const ax = tipX - ah * Math.cos(end + 0.8);
            const ay = tipY - ah * Math.sin(end + 0.8);
            const bx = tipX - ah * Math.cos(end - 0.8);
            const by = tipY - ah * Math.sin(end - 0.8);
            ctx.beginPath();
            ctx.moveTo(tipX, tipY);
            ctx.lineTo(ax, ay);
            ctx.lineTo(bx, by);
            ctx.closePath();
            ctx.fillStyle = `rgba(255,255,255,${0.55 * alpha})`;
            ctx.fill();
        }

        function drawVertices() {

            for (let i = 0; i < 4; i++) {
                const c = corners[i];
                const hovered = findNearVertex(mousePos) === i;

                if (isAnchor) {
                    ctx.fillStyle = '#ff6b6b';

                    ctx.lineWidth = 3;
                } else {
                    ctx.fillStyle = hovered ? '#5dfcd1' : '#4ecdc4';
                    ctx.strokeStyle = '#3db8a8';
                    ctx.lineWidth = 2;
                }
                ctx.fill();
                ctx.stroke();
            }

            const anchor = corners[showAnchor];
            const pulseR = 16 + Math.sin(Date.now() * 0.006) * 3;
            ctx.beginPath();

        /* ── Loop ── */

        }

                        }

                    }
                } else if (currentLevel === 3) {
                    if (checkSuccess()) { score++; showVictory(); }
                    else if (checkLevel3Failure()) {
                        showFailure();
                        cooldownTimer = COOLDOWN_FRAMES;
                    }
                } else if (currentLevel === 10) {
                    if (checkSuccess()) { score++; showVictory(); }
                    else if (checkLevel10Failure()) {
                        const cx = (corners[0].x + corners[2].x) / 2;
                        const cy = (corners[0].y + corners[2].y) / 2;
                        showFailure();
                        cooldownTimer = COOLDOWN_FRAMES;
                    }
                } else if (currentLevel === 4) {
                    if (checkLevel4Success()) { score++; showVictory(); }
                    else if (checkLevel4Failure()) {
                        const cx = (corners[0].x + corners[2].x) / 2;
                        const cy = (corners[0].y + corners[2].y) / 2;
                        showFailure();
                        cooldownTimer = COOLDOWN_FRAMES;
                    }
                } else if (currentLevel === 6) {
                    if (checkSuccess()) { score++; showVictory(); }
                    else if (checkLevel6Failure()) {
                        const cx = (corners[0].x + corners[2].x) / 2;
                        const cy = (corners[0].y + corners[2].y) / 2;
                        showFailure();
                        cooldownTimer = COOLDOWN_FRAMES;
                    }
                } else if (currentLevel === 7 || currentLevel === 11) {
                    if (checkSuccess()) { score++; showVictory(); }
                    else if (currentLevel === 7 ? checkLevel7Failure() : checkLevel11Failure()) {
                        const cx = (corners[0].x + corners[2].x) / 2;
                        const cy = (corners[0].y + corners[2].y) / 2;
                        showFailure();
                        cooldownTimer = COOLDOWN_FRAMES;
                    }
                } else if (currentLevel === 8) {
                    if (checkLevel8Success()) { score++; showVictory(); }
                    else if (checkLevel8Failure()) {
                        const cx = (corners[0].x + corners[2].x) / 2;
                        const cy = (corners[0].y + corners[2].y) / 2;
                        showFailure();
                        cooldownTimer = COOLDOWN_FRAMES;
                    }
                } else if (currentLevel === 12) {
                    if (checkLevel12Success()) { score++; showVictory(); }
                } else if (currentLevel === 13) {
                    if (checkLevel13Success()) { score++; showVictory(); }
                    else if (checkLevel13Failure()) {
                        const cx = (corners[0].x + corners[2].x) / 2;
                        const cy = (corners[0].y + corners[2].y) / 2;
                        showFailure();
                        cooldownTimer = COOLDOWN_FRAMES;
                    }
                } else if (currentLevel === 9) {
                    if (checkLevel9Success()) { score++; showVictory(); }
                } else {
                    if (checkSuccess()) { score++; showVictory(); }
                }
            }

            if (cooldownTimer > 0) {
                cooldownTimer--;
                if (cooldownTimer === 0) {
                    if (currentLevel === 3) resetLevel3();
                    else if (currentLevel === 10) resetLevel10();
                    else if (currentLevel === 4) resetLevel4();
                    else if (currentLevel === 6) resetLevel6();
                    else if (currentLevel === 7) resetLevel7();
                    else if (currentLevel === 11) resetLevel11();
                    else if (currentLevel === 8) resetLevel8();
                    else if (currentLevel === 13) resetLevel13();
                }
            }

            for (const ft of floatingTexts) {
                ft.y += ft.vy;
                ft.opacity -= 0.012;
            }
            floatingTexts = floatingTexts.filter(ft => ft.opacity > 0);
        }

        function loop() {
            if (gameState === 'PLAYING' || gameState === 'MAP' || gameState === 'MYSTERY') {
                update();
                draw();
                if ((gameState === 'MAP' || gameState === 'MYSTERY') && corners2.length > 0) updateLevel8Hero2();
            }
            requestAnimationFrame(loop);
        }

        /* ── Settings ── */

        const settingsBtn = document.getElementById('settingsBtn');
        const speedMenu = document.getElementById('speedMenu');
        const speedItems = speedMenu.querySelectorAll('.speed-item');

        settingsBtn.addEventListener('click', e => {
            e.stopPropagation();
            speedMenu.classList.toggle('open');
        });

        document.addEventListener('click', () => {
            speedMenu.classList.remove('open');
        });

        speedItems.forEach(item => {
            item.addEventListener('click', e => {
                e.stopPropagation();
                speedMultiplier = parseFloat(item.dataset.speed);
                speedItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                speedMenu.classList.remove('open');
            });
        });

        const scaleSlider = document.getElementById('scaleSlider');
        const scaleVal = document.getElementById('scaleVal');
        scaleSlider.addEventListener('input', () => {
            const pct = parseInt(scaleSlider.value);
            scaleVal.textContent = pct + '%';
        });
        scaleSlider.addEventListener('change', () => {
            const pct = parseInt(scaleSlider.value);
            scaleVal.textContent = pct + '%';
            applyScale(pct / 100);
        });

        /* ── Victory ── */

        const resultOverlay = document.getElementById('resultOverlay');
        const resultText = document.getElementById('resultText');
        const resultBtn = document.getElementById('resultBtn');

        const FAILURE_TEXTS = ['锚中出错', '手锚脚乱', '做锚不易', '锚里求死'];

        function showVictory() {
            score++;
            const ch = CHAPTERS[chapterIdx];
            completedChapters[ch.id] = true;
            gameState = 'VICTORY';
            const suffix = ch.id.split('-')[1];
            const texts = { '1': '锚到成功', '2': '锚开二度', '3': '锚子戏法' };
            resultText.textContent = (texts[suffix] || '锚到成功') + '!';
            resultText.style.color = '#f0a500';
            if (ch.id === '3-3') {
                resultBtn.textContent = '下一关？';
                resultBtn.onclick = () => {
                    resultOverlay.classList.add('hidden');
                    gameState = 'MYSTERY';
                    initMystery();
                };
            } else if (chapterIdx + 1 < CHAPTERS.length) {
                resultBtn.textContent = '下一关';
                resultBtn.onclick = () => {
                    chapterIdx++;
                    resultOverlay.classList.add('hidden');
                    gameState = 'MAP';
                    initMap();
                };
            } else {
                resultBtn.textContent = '回到主界面';
                resultBtn.onclick = () => {
                    resultOverlay.classList.add('hidden');
                    gameState = 'MAP';
                    initMap();
                };
            }
            resultOverlay.classList.remove('hidden');
        }

        function showFailure() {
            gameState = 'VICTORY';
            resultText.textContent = FAILURE_TEXTS[Math.floor(Math.random() * FAILURE_TEXTS.length)] + '!';
            resultText.style.color = '#ff4444';
            resultBtn.textContent = '重试';
            resultBtn.onclick = () => {
                resultOverlay.classList.add('hidden');
                startLevel(currentLevel);
            };
            resultOverlay.classList.remove('hidden');
        }

        function initMap() {
            heroMotion = chapterIdx >= 3 && chapterIdx < 6 ? 'scale' : 'rotate';
            state = 'ROTATING';
            backBtn.classList.add('hidden');
            mapTargets = [];
            const w = W * 1.4, h = H * 1.4;

            const positions = [];
            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 3; col++) {
                    positions.push({ x: canvasW * (0.2 + col * 0.3), y: canvasH * (0.2 + row * 0.3) });
                }
            }
            [positions[3], positions[5]] = [positions[5], positions[3]];

            for (let i = 0; i < CHAPTERS.length; i++) {
                const ch = CHAPTERS[i];
                if (ch.id === '4-1') continue;
                let status = 'locked';
                if (i === 0 || completedChapters[CHAPTERS[i - 1]?.id]) status = 'unlocked';
                if (completedChapters[ch.id]) status = 'completed';
                const pos = positions[i];
                mapTargets.push({ cx: pos.x, cy: pos.y, w, h, status, id: ch.id, level: ch.level, idx: i });
            }

            const lastComplete = mapTargets.filter(t => t.status === 'completed').pop();
            const cx = lastComplete ? lastComplete.cx : canvasW / 2;
            const cy = lastComplete ? lastComplete.cy : canvasH / 2;
            corners = [
                { x: cx - W / 2, y: cy - H / 2 },
                { x: cx + W / 2, y: cy - H / 2 },
                { x: cx + W / 2, y: cy + H / 2 },
                { x: cx - W / 2, y: cy + H / 2 },
            ];
            anchorIdx = 0; angle = 0;
            scaleValue = 0.5; scalePhase = 0; scaleDir = 1;
            anchorPos = { ...corners[anchorIdx] };
            recomputeBaseOffsets();
            if (heroMotion === 'scale') recomputeScaleOffsets();

            if (chapterIdx >= 6) {
                const c2x = cx, c2y = cy;
                corners2 = [
                    { x: c2x - W / 2, y: c2y - H / 2 },
                    { x: c2x + W / 2, y: c2y - H / 2 },
                    { x: c2x + W / 2, y: c2y + H / 2 },
                    { x: c2x - W / 2, y: c2y + H / 2 },
                ];
                hero2Motion = 'scale';
                scaleAnchorIdx2 = 2;
                scaleValue2 = 0.5; scalePhase2 = 0; scaleDir2 = 1;
                recomputeScaleOffsets2();
            } else {
                corners2 = [];
            }
        }

        function drawMapTargets() {
            for (let i = 0; i < mapTargets.length; i++) {
                const t = mapTargets[i];
                if (t.status === 'locked') continue;
                if (i > 0 && mapTargets[i - 1].status !== 'locked') {
                    const prev = mapTargets[i - 1];
                    ctx.beginPath();
                    ctx.moveTo(prev.cx, prev.cy);
                    ctx.lineTo(t.cx, t.cy);
                    ctx.strokeStyle = t.status === 'completed' ? 'rgba(240,165,0,0.3)' : 'rgba(255,255,255,0.1)';
                    ctx.lineWidth = 1.5;
                    ctx.setLineDash([4, 4]);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
                ctx.beginPath();
                ctx.rect(t.cx - t.w / 2, t.cy - t.h / 2, t.w, t.h);
                if (t.status === 'completed') {
                    ctx.fillStyle = 'rgba(240,165,0,0.2)';
                    ctx.fill();
                }
                ctx.strokeStyle = t.status === 'completed' ? '#f0a500' : 'rgba(240,165,0,0.4)';
                ctx.lineWidth = 2;
                ctx.setLineDash(t.status === 'completed' ? [] : [6, 3]);
                ctx.stroke();
                ctx.setLineDash([]);

                const showAnchor = [0,1,2,6,7,8].includes(i);
                const showFake = [3,4,5,6,7,8].includes(i);
                const both = i >= 6 && i <= 8;
                const pad = Math.min(t.w, t.h) * 0.18;
                const sh = t.h - pad * 2;

                if (showAnchor && imgLoaded && anchorImg.width > 1) {
                    const iw = anchorImg.width, ih = anchorImg.height;
                    const h = both ? sh : sh;
                    const w = h * iw / ih;
                    const sx = both ? t.cx - t.w * 0.1 - w / 2 : t.cx - w / 2;
                    ctx.save(); ctx.globalAlpha = 0.10;
                    ctx.drawImage(anchorImg, sx, t.cy - h / 2, w, h);
                    ctx.restore();
                }
                if (showFake && fakeAnchorLoaded && fakeAnchorImg.width > 1) {
                    const iw = fakeAnchorImg.width, ih = fakeAnchorImg.height;
                    const h = both ? sh : sh;
                    const w = h * iw / ih;
                    const sx = both ? t.cx + t.w * 0.1 - w / 2 : t.cx - w / 2;
                    ctx.save(); ctx.globalAlpha = 0.10;
                    ctx.drawImage(fakeAnchorImg, sx, t.cy - h / 2, w, h);
                    ctx.restore();
                }

                ctx.fillStyle = t.status === 'completed' ? '#f0a500' : 'rgba(255,255,255,0.5)';
                ctx.font = 'bold 64px "Segoe UI", sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(t.id, t.cx, t.cy);
                ctx.textBaseline = 'alphabetic';
            }
        }

        const titleOverlay = document.getElementById('titleOverlay');
        titleOverlay.addEventListener('click', () => {
            titleOverlay.classList.add('hidden');
            gameState = 'MAP';
            initMap();
        });

        document.querySelectorAll('.debug-btn[data-ch]').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const targetIdx = parseInt(btn.dataset.ch);
                completedChapters = {};
                for (let i = 0; i < targetIdx; i++) completedChapters[CHAPTERS[i].id] = true;
                chapterIdx = targetIdx;
                titleOverlay.classList.add('hidden');
                gameState = 'MAP';
                initMap();
            });
        });

        document.querySelectorAll('.enter-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                e.stopPropagation();
                const lvl = parseInt(btn.dataset.lvl);
                const ch = CHAPTERS.find(c => c.level === lvl);
                chapterIdx = CHAPTERS.indexOf(ch);
                currentLevel = lvl;
                titleOverlay.classList.add('hidden');
                startLevel(lvl);
            });
        });

        /* ── Level Selection ── */

        const menuOverlay = document.getElementById('menuOverlay');
        const backBtn = document.getElementById('backBtn');

        function startLevel(level) {
            currentLevel = level;
            gameState = 'PLAYING';
            score = 0;
            floatingTexts = [];
            cooldownTimer = 0;
            state = 'ROTATING';
            angle = 0;
            anchorIdx = 0;
            traps = [];
            targets = [];
            backBtn.classList.remove('hidden');
            if (level === 3) initLevel3();
            else if (level === 4) initLevel4();
            else if (level === 10) initLevel10();
            else if (level === 11) initLevel11();
            else if (level === 12) initLevel12();
            else if (level === 13) initLevel13();
            else if (level === 6) initLevel6();
            else if (level === 7) initLevel7();
            else if (level === 8) initLevel8();
            else if (level === 9) initLevel9();
        }

        function backToMenu() {
            gameState = 'MAP';
            initMap();
            backBtn.classList.add('hidden');
            resultOverlay.classList.add('hidden');
        }

        backBtn.addEventListener('click', backToMenu);

        /* ── Init ── */

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        canvasW = canvas.width;
        canvasH = canvas.height;
        window.addEventListener('resize', resize);
        loop();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

        const landscapeHint = document.getElementById('landscapeHint');
        function checkOrientation() {
            const isPortrait = window.innerWidth < window.innerHeight;
            const isTouch = 'ontouchstart' in window;
            if (isTouch && isPortrait && window.innerWidth < 1024) {
                landscapeHint.classList.add('show');
            } else {
                landscapeHint.classList.remove('show');
            }
        }
        checkOrientation();
        window.addEventListener('resize', checkOrientation);
        window.addEventListener('orientationchange', checkOrientation);
    </script>
    <div class="landscape-hint" id="landscapeHint">
        <div class="landscape-icon"></div>
        <div>请旋转设备至横屏以获得最佳体验</div>
    </div>
</body>
</html>
